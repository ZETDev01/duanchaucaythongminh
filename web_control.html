<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chậu Cây Thông Minh - Điều Khiển</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .main-container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        
        .pot-item {
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid #667eea;
        }
        
        .pot-item:hover {
            background-color: #f8f9fa;
            transform: translateX(5px);
        }
        
        .weather-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .sensor-badge {
            font-size: 1.5rem;
            padding: 10px 20px;
        }
        
        .pump-btn {
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        .pump-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .hidden {
            display: none;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .pumping {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Layer 1: Danh sách chậu cây -->
        <div id="layerPotList" class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-seedling"></i> Danh Sách Chậu Cây</h4>
            </div>
            <div class="card-body">
                <div id="potList" class="list-group">
                    <!-- Sẽ được tạo động bằng JavaScript -->
                </div>
            </div>
        </div>

        <!-- Layer 2: Chọn/Nhập tên cây -->
        <div id="layerSelectPlant" class="card hidden">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">
                    <button class="btn btn-light btn-sm me-2" onclick="backToPotList()">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    Đặt Tên Cho Chậu
                </h4>
            </div>
            <div class="card-body">
                <h5 class="mb-3">Chọn loại cây cảnh:</h5>
                <div class="row g-2 mb-3">
                    <div class="col-6 col-md-4">
                        <button class="btn btn-outline-success w-100" onclick="selectPlant('Hoa Lan')">
                            <i class="fas fa-flower"></i> Hoa Lan
                        </button>
                    </div>
                    <div class="col-6 col-md-4">
                        <button class="btn btn-outline-success w-100" onclick="selectPlant('Sen Đá')">
                            <i class="fas fa-leaf"></i> Sen Đá
                        </button>
                    </div>
                    <div class="col-6 col-md-4">
                        <button class="btn btn-outline-success w-100" onclick="selectPlant('Cây Kim Tiền')">
                            <i class="fas fa-coins"></i> Kim Tiền
                        </button>
                    </div>
                    <div class="col-6 col-md-4">
                        <button class="btn btn-outline-success w-100" onclick="selectPlant('Cây Lưỡi Hổ')">
                            <i class="fas fa-spa"></i> Lưỡi Hổ
                        </button>
                    </div>
                    <div class="col-6 col-md-4">
                        <button class="btn btn-outline-success w-100" onclick="selectPlant('Xương Rồng')">
                            <i class="fas fa-cactus"></i> Xương Rồng
                        </button>
                    </div>
                    <div class="col-6 col-md-4">
                        <button class="btn btn-outline-success w-100" onclick="selectPlant('Phú Quý')">
                            <i class="fas fa-tree"></i> Phú Quý
                        </button>
                    </div>
                </div>
                <hr>
                <h5 class="mb-3">Hoặc nhập tên tự chọn:</h5>
                <div class="input-group">
                    <input type="text" id="customPlantName" class="form-control" placeholder="Nhập tên cây...">
                    <button class="btn btn-primary" onclick="selectCustomPlant()">
                        <i class="fas fa-check"></i> Xác Nhận
                    </button>
                </div>
            </div>
        </div>

        <!-- Layer 3: Giao diện điều khiển chi tiết -->
        <div id="layerControl" class="hidden">
            <!-- Header -->
            <div class="card">
                <div class="card-header bg-info text-white">
                    <h4 class="mb-0">
                        <button class="btn btn-light btn-sm me-2" onclick="backToPotList()">
                            <i class="fas fa-arrow-left"></i>
                        </button>
                        <span id="currentPotName">Chậu 1</span>
                    </h4>
                </div>
            </div>

            <!-- Thời tiết Hà Nội -->
            <div class="card weather-card">
                <div class="card-body">
                    <h5 class="mb-3"><i class="fas fa-cloud-sun"></i> Thời Tiết Hà Nội</h5>
                    <div class="row text-center">
                        <div class="col-6 col-md-3">
                            <div>
                                <i class="fas fa-thermometer-half fa-2x mb-2"></i>
                                <h3 id="weatherTemp">--°C</h3>
                                <small>Nhiệt độ</small>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div>
                                <i class="fas fa-tint fa-2x mb-2"></i>
                                <h3 id="weatherHumidity">--%</h3>
                                <small>Độ ẩm</small>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div>
                                <i class="fas fa-wind fa-2x mb-2"></i>
                                <h3 id="weatherWind">-- m/s</h3>
                                <small>Gió</small>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div>
                                <i id="weatherIcon" class="fas fa-cloud fa-2x mb-2"></i>
                                <h3 id="weatherDesc">--</h3>
                                <small>Trạng thái</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Dữ liệu cảm biến Firebase -->
            <div class="card">
                <div class="card-body">
                    <h5 class="mb-3"><i class="fas fa-database"></i> Dữ Liệu Cảm Biến</h5>
                    <div class="row text-center">
                        <div class="col-6">
                            <div class="p-3 bg-light rounded">
                                <i class="fas fa-droplet fa-2x text-primary mb-2"></i>
                                <h2 id="soilMoisture" class="text-primary">--%</h2>
                                <p class="mb-0">Độ Ẩm Đất</p>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 bg-light rounded">
                                <i class="fas fa-pump-soap fa-2x text-success mb-2"></i>
                                <h2 id="pumpStatus" class="text-success">TẮT</h2>
                                <p class="mb-0">Trạng Thái Bơm</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Điều khiển bơm -->
            <div class="card">
                <div class="card-body">
                    <h5 class="mb-3"><i class="fas fa-hand-pointer"></i> Điều Khiển Bơm Nước - <span id="plantTypeDisplay">Hoa Lan</span></h5>
                    <div class="row g-3">
                        <div class="col-4">
                            <button class="btn btn-success pump-btn w-100" onclick="controlPump(1)">
                                <i class="fas fa-water"></i><br>
                                100ml<br>
                                <small>(1 giây)</small>
                            </button>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-primary pump-btn w-100" onclick="controlPump(2)">
                                <i class="fas fa-water"></i><br>
                                200ml<br>
                                <small>(2 giây)</small>
                            </button>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-warning pump-btn w-100" onclick="controlPump(3)">
                                <i class="fas fa-water"></i><br>
                                300ml<br>
                                <small>(3 giây)</small>
                            </button>
                        </div>
                    </div>
                    <div id="pumpMessage" class="alert alert-info mt-3 hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module">
        // Import Firebase
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
        
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD6nfRy6E5R6M6cPYelb9DkV80PZWOU928",
            authDomain: "duanchaucayfpt.firebaseapp.com",
            databaseURL: "https://duanchaucayfpt-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "duanchaucayfpt",
            storageBucket: "duanchaucayfpt.firebasestorage.app",
            messagingSenderId: "628418973207",
            appId: "1:628418973207:web:92de14c34f9e3a7cb75652",
            measurementId: "G-HRRGFHV80R"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // Weather API
        const weatherApiKey = "d62482041e85e8b83f2d849e3a88cf52";
        const city = "Hanoi";
        
        // Dữ liệu chậu cây (lưu trong localStorage)
        let pots = JSON.parse(localStorage.getItem('smartPots')) || [
            { id: 1, name: null }
        ];
        
        let currentPotId = null;
        
        // Render danh sách chậu
        function renderPotList() {
            const potListDiv = document.getElementById('potList');
            potListDiv.innerHTML = '';
            
            pots.forEach(pot => {
                const potItem = document.createElement('div');
                potItem.className = 'list-group-item list-group-item-action pot-item';
                
                if (pot.name) {
                    potItem.innerHTML = `
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="mb-1"><i class="fas fa-seedling text-success"></i> Chậu ${pot.id}: ${pot.name}</h5>
                            </div>
                            <i class="fas fa-chevron-right"></i>
                        </div>
                    `;
                    potItem.onclick = () => openPotControl(pot.id);
                } else {
                    potItem.innerHTML = `
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="mb-1"><i class="fas fa-plus-circle text-primary"></i> Chậu ${pot.id}: Chưa đặt tên</h5>
                                <small class="text-muted">Nhấn để đặt tên cho chậu cây</small>
                            </div>
                            <i class="fas fa-chevron-right"></i>
                        </div>
                    `;
                    potItem.onclick = () => openSelectPlant(pot.id);
                }
                
                potListDiv.appendChild(potItem);
            });
        }
        
        // Mở layer chọn tên cây
        window.openSelectPlant = function(potId) {
            currentPotId = potId;
            document.getElementById('layerPotList').classList.add('hidden');
            document.getElementById('layerSelectPlant').classList.remove('hidden');
            document.getElementById('customPlantName').value = '';
        };
        
        // Chọn cây từ danh sách
        window.selectPlant = function(plantName) {
            const pot = pots.find(p => p.id === currentPotId);
            if (pot) {
                pot.name = plantName;
                localStorage.setItem('smartPots', JSON.stringify(pots));
                openPotControl(currentPotId);
            }
        };
        
        // Chọn cây tự nhập
        window.selectCustomPlant = function() {
            const customName = document.getElementById('customPlantName').value.trim();
            if (customName) {
                selectPlant(customName);
            } else {
                alert('Vui lòng nhập tên cây!');
            }
        };
        
        // Quay lại danh sách chậu
        window.backToPotList = function() {
            document.getElementById('layerPotList').classList.remove('hidden');
            document.getElementById('layerSelectPlant').classList.add('hidden');
            document.getElementById('layerControl').classList.add('hidden');
            renderPotList();
        };
        
        // Mở giao diện điều khiển
        window.openPotControl = function(potId) {
            currentPotId = potId;
            const pot = pots.find(p => p.id === potId);
            
            if (!pot || !pot.name) {
                openSelectPlant(potId);
                return;
            }
            
            document.getElementById('layerPotList').classList.add('hidden');
            document.getElementById('layerSelectPlant').classList.add('hidden');
            document.getElementById('layerControl').classList.remove('hidden');
            
            document.getElementById('currentPotName').textContent = `Chậu ${pot.id}: ${pot.name}`;
            document.getElementById('plantTypeDisplay').textContent = pot.name;
            
            // Lấy dữ liệu thời tiết
            fetchWeather();
            
            // Lắng nghe Firebase
            listenFirebaseData();
        };
        
        // Lấy dữ liệu thời tiết
        async function fetchWeather() {
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${weatherApiKey}&units=metric&lang=vi`);
                const data = await response.json();
                
                document.getElementById('weatherTemp').textContent = Math.round(data.main.temp) + '°C';
                document.getElementById('weatherHumidity').textContent = data.main.humidity + '%';
                document.getElementById('weatherWind').textContent = data.wind.speed + ' m/s';
                document.getElementById('weatherDesc').textContent = data.weather[0].description;
                
                // Thay đổi icon theo thời tiết
                const iconMap = {
                    '01d': 'fa-sun', '01n': 'fa-moon',
                    '02d': 'fa-cloud-sun', '02n': 'fa-cloud-moon',
                    '03d': 'fa-cloud', '03n': 'fa-cloud',
                    '04d': 'fa-cloud', '04n': 'fa-cloud',
                    '09d': 'fa-cloud-rain', '09n': 'fa-cloud-rain',
                    '10d': 'fa-cloud-sun-rain', '10n': 'fa-cloud-moon-rain',
                    '11d': 'fa-bolt', '11n': 'fa-bolt',
                    '13d': 'fa-snowflake', '13n': 'fa-snowflake',
                    '50d': 'fa-smog', '50n': 'fa-smog'
                };
                
                const iconClass = iconMap[data.weather[0].icon] || 'fa-cloud';
                document.getElementById('weatherIcon').className = `fas ${iconClass} fa-2x mb-2`;
                
            } catch (error) {
                console.error('Lỗi lấy dữ liệu thời tiết:', error);
            }
        }
        
        // Lắng nghe dữ liệu Firebase
        function listenFirebaseData() {
            // Độ ẩm đất
            const soilRef = ref(db, '/do_am_dat');
            onValue(soilRef, (snapshot) => {
                const value = snapshot.val();
                if (value !== null) {
                    document.getElementById('soilMoisture').textContent = value + '%';
                }
            });
            
            // Trạng thái bơm
            const pumpRef = ref(db, '/trang_thai_bom');
            onValue(pumpRef, (snapshot) => {
                const value = snapshot.val();
                const pumpStatusEl = document.getElementById('pumpStatus');
                
                if (value === true) {
                    pumpStatusEl.textContent = 'BẬT';
                    pumpStatusEl.className = 'text-danger pumping';
                } else {
                    pumpStatusEl.textContent = 'TẮT';
                    pumpStatusEl.className = 'text-success';
                }
            });
        }
        
        // Điều khiển bơm
        window.controlPump = function(seconds) {
            const pumpRef = ref(db, '/trang_thai_bom');
            const messageEl = document.getElementById('pumpMessage');
            
            // Bật bơm
            set(pumpRef, true)
                .then(() => {
                    messageEl.textContent = `⏱️ Đang bơm ${seconds * 100}ml (${seconds} giây)...`;
                    messageEl.className = 'alert alert-warning mt-3';
                    messageEl.classList.remove('hidden');
                    
                    // Tắt sau X giây
                    setTimeout(() => {
                        set(pumpRef, false)
                            .then(() => {
                                messageEl.textContent = '✅ Đã hoàn thành bơm nước!';
                                messageEl.className = 'alert alert-success mt-3';
                                
                                setTimeout(() => {
                                    messageEl.classList.add('hidden');
                                }, 3000);
                            });
                    }, seconds * 1000);
                })
                .catch((error) => {
                    console.error('Lỗi:', error);
                    messageEl.textContent = '❌ Lỗi: ' + error.message;
                    messageEl.className = 'alert alert-danger mt-3';
                    messageEl.classList.remove('hidden');
                });
        };
        
        // Khởi tạo
        renderPotList();
        
        // Tự động cập nhật thời tiết mỗi 10 phút
        setInterval(() => {
            if (!document.getElementById('layerControl').classList.contains('hidden')) {
                fetchWeather();
            }
        }, 600000);
    </script>
</body>
</html>
